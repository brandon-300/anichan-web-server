<style>
        .glass-panel {
            background-color: rgba(18, 18, 22, 0.85); /* #121216 at 85% */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(221, 183, 255, 0.2);
            border-left: 1px solid rgba(221, 183, 255, 0.1);
            border-right: 1px solid rgba(221, 183, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .input-dark {
            background-color: #0a0a0c;
            border: 1px solid #4d4354;
            color: #e5e1e4;
        }
        
        .input-dark:focus {
            border-color: #5de6ff;
            outline: none;
            box-shadow: 0 0 10px rgba(93, 230, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #b76dff 0%, #842bd2 100%);
            color: white;
            box-shadow: 0 0 15px rgba(183, 109, 255, 0.4);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(183, 109, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid #5de6ff;
            color: #5de6ff;
            transition: all 0.3s ease;
        }

        .btn-ghost:hover {
            background: rgba(93, 230, 255, 0.1);
            box-shadow: 0 0 15px rgba(93, 230, 255, 0.2);
        }

        /* Sliding panel logic */
        .auth-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
            min-height: 500px;
        }

        .auth-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }

        .panel-left {
            transform: translateX(0);
            opacity: 1;
            z-index: 10;
        }

        .panel-right {
            transform: translateX(100%);
            opacity: 0;
            z-index: 5;
        }

        .show-signup .panel-left {
            transform: translateX(-100%);
            opacity: 0;
            z-index: 5;
        }

        .show-signup .panel-right {
            transform: translateX(0);
            opacity: 1;
            z-index: 10;
        }
        
        /* Custom scrollbar for signup if needed on small screens */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4d4354;
            border-radius: 4px;
        }
    </style>

<!-- Atmospheric overlay -->
<div class="absolute inset-0 bg-surface-dim/80 backdrop-blur-[2px]"></div>
<!-- Neon environmental glows -->

<div class="absolute bottom-1/4 right-1/4 w-[30vw] h-[30vw] bg-secondary/15 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Main Auth Card -->
<div class="relative w-full max-w-md md:max-w-4xl mx-auto h-[1024px] md:h-auto md:min-h-[600px] flex md:rounded-2xl shadow-[0_0_40px_rgba(183,109,255,0.1)] glass-panel overflow-hidden" id="authWrapper">
<!-- Desktop Decorative Side Panel (Hidden on mobile) -->
<div class="hidden md:flex w-1/2 flex-col justify-between p-12 relative border-r border-outline-variant/20 bg-surface-container-low/50">
<div class="z-10">

<p class="font-body-lg text-body-lg text-on-surface-variant mt-4">Enter the nocturnal digital lounge.</p>
</div>
<!-- Abstract decorative element -->

<span class="material-symbols-outlined text-[200px] text-primary/40 animate-pulse" style="font-variation-settings: 'FILL' 1;">
                    hub
                </span>
</div>
<div class="z-10">
<div class="flex gap-4">
<div class="h-1 w-12 bg-secondary rounded-full"></div>
<div class="h-1 w-4 bg-outline-variant rounded-full"></div>
<div class="h-1 w-4 bg-outline-variant rounded-full"></div>
</div>
</div>
</div>
<!-- Sliding Forms Container -->
<div class="w-full md:w-1/2 auth-container p-6 md:p-12 relative">
<!-- Mobile Brand Header (Visible only on mobile) -->

<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tighter drop-shadow-[0_0_10px_rgba(221,183,255,0.5)]">AniChan</h1>
</div>
<!-- Login Panel (Left) -->
<div class="auth-panel panel-left flex flex-col justify-center">
<div class="mb-8">

<p class="font-body-md text-body-md text-on-surface-variant">Log in to continue your journey.</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2 relative group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors block">Email or Username</label>
<div class="relative">

<input class="input-dark w-full rounded-lg h-12 pl-10 pr-4 font-body-md text-body-md transition-all" placeholder="Enter your handle" type="text"/>
</div>
</div>
<div class="space-y-2 relative group">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors block">Password</label>
<a class="font-caption text-caption text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">

<input class="input-dark w-full rounded-lg h-12 pl-10 pr-10 font-body-md text-body-md transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors focus:outline-none" type="button">

</div>
</div>
<button class="btn-primary w-full h-12 rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 mt-8" type="submit">

</button>

<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        New here?

                            Create an account

</p>

<!-- Sign-up Panel (Right) -->
<div class="auth-panel panel-right flex flex-col justify-start md:justify-center overflow-y-auto pb-8">

<p class="font-body-md text-body-md text-on-surface-variant">Setup your profile.</p>
</div>
<form class="space-y-4" onsubmit="event.preventDefault();">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1 relative group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors block text-xs">First Name</label>
<input class="input-dark w-full rounded-lg h-10 px-3 font-body-md text-body-md transition-all" placeholder="First" type="text"/>
</div>
<div class="space-y-1 relative group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors block text-xs">Last Name</label>
<input class="input-dark w-full rounded-lg h-10 px-3 font-body-md text-body-md transition-all" placeholder="Last" type="text"/>
</div>
</div>
<div class="space-y-1 relative group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors block text-xs">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-secondary transition-colors text-[18px]">alternate_email</span>
<input class="input-dark w-full rounded-lg h-10 pl-9 pr-3 font-body-md text-body-md transition-all" placeholder="Choose a handle" type="text"/>
</div>
</div>
<div class="space-y-1 relative group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors block text-xs">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-secondary transition-colors text-[18px]">mail</span>
<input class="input-dark w-full rounded-lg h-10 pl-9 pr-3 font-body-md text-body-md transition-all" placeholder="your@email.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant block text-xs">Date of Birth</label>
<div class="grid grid-cols-3 gap-2">
<select class="input-dark rounded-lg h-10 px-2 font-body-md text-body-md text-sm cursor-pointer appearance-none">
<option disabled="" selected="" value="">MM</option>
<option value="01">Jan</option>
<option value="02">Feb</option>
<!-- Truncated for brevity -->
</select>
<select class="input-dark rounded-lg h-10 px-2 font-body-md text-body-md text-sm cursor-pointer appearance-none">
<option disabled="" selected="" value="">DD</option>
<option value="01">01</option>
<option value="02">02</option>
<!-- Truncated for brevity -->
</select>
<select class="input-dark rounded-lg h-10 px-2 font-body-md text-body-md text-sm cursor-pointer appearance-none" id="yearSelect" onchange="calculateAge()">
<option disabled="" selected="" value="">YYYY</option>
<!-- Populated by JS -->
</select>
</div>
<p class="font-caption text-caption text-secondary h-4 mt-1 opacity-0 transition-opacity" id="ageDisplay">Calculated Age: -</p>
</div>
<div class="space-y-1 relative group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors block text-xs">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-secondary transition-colors text-[18px]">key</span>
<input class="input-dark w-full rounded-lg h-10 pl-9 pr-10 font-body-md text-body-md transition-all" id="signupPassword" oninput="checkStrength()" placeholder="Create password" type="password"/>
</div>
<!-- Strength Meter -->
<div class="flex gap-1 mt-2 h-1 w-full rounded-full overflow-hidden bg-surface-container-high">
<div class="h-full w-1/4 transition-all duration-300" id="strength-1"></div>
<div class="h-full w-1/4 transition-all duration-300" id="strength-2"></div>
<div class="h-full w-1/4 transition-all duration-300" id="strength-3"></div>
<div class="h-full w-1/4 transition-all duration-300" id="strength-4"></div>
</div>
</div>
<button class="btn-primary w-full h-12 rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 mt-6" type="submit">
                        Create Account
                    </button>
<button class="btn-ghost w-full h-12 rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 mt-3" onclick="toggleAuthMode()" type="button">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
                        Back to Login
                    </button>
</form>
</div>
</div>
</div>
<script>
        // Toggle sliding panels
        function toggleAuthMode() {
            document.getElementById('authWrapper').classList.toggle('show-signup');
        }

        // Populate years for select
        const yearSelect = document.getElementById('yearSelect');
        const currentYear = new Date().getFullYear();
        for (let i = currentYear; i >= currentYear - 100; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.text = i;
            yearSelect.appendChild(option);
        }

        // Dummy Age Calculation
        function calculateAge() {
            const selectedYear = parseInt(document.getElementById('yearSelect').value);
            if (selectedYear) {
                const age = currentYear - selectedYear;
                const display = document.getElementById('ageDisplay');
                display.innerText = `Estimated Age: ~${age}`;
                display.style.opacity = '1';
            }
        }

        // Simple Password Strength
        function checkStrength() {
            const pw = document.getElementById('signupPassword').value;
            const s1 = document.getElementById('strength-1');
            const s2 = document.getElementById('strength-2');
            const s3 = document.getElementById('strength-3');
            const s4 = document.getElementById('strength-4');
            
            // Reset
            [s1, s2, s3, s4].forEach(el => el.style.backgroundColor = 'transparent');
            
            let strength = 0;
            if(pw.length > 0) strength++;
            if(pw.length > 5) strength++;
            if(pw.length > 8 && /[A-Z]/.test(pw) && /[0-9]/.test(pw)) strength++;
            if(pw.length > 10 && /[^A-Za-z0-9]/.test(pw)) strength++;

            if(strength >= 1) s1.style.backgroundColor = '#ffb4ab'; // error
            if(strength >= 2) s2.style.backgroundColor = '#ddb7ff'; // primary
            if(strength >= 3) s3.style.backgroundColor = '#5de6ff'; // secondary
            if(strength >= 4) s4.style.backgroundColor = '#5de6ff';
        }
    </script>
